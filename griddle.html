<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Griddle</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; user-select: none; }

  #toolbar { height: 52px; background: #F8FBFF; border-bottom: 1px solid #e5e5e5; display: flex; align-items: center; padding: 0 16px; gap: 10px; flex-shrink: 0; z-index: 100; }
  #logo { font-weight: 800; font-size: 18px; letter-spacing: -0.5px; margin-right: 8px; }
  .pill-btn { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border: 1.5px solid #d0d0d0; border-radius: 999px; background: #fff; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; }
  .pill-btn:hover { border-color: #999; }
  .dropdown-wrap { position: relative; }
  .dropdown-menu { display: none; position: absolute; top: calc(100% + 6px); left: 0; background: #fff; border: 1.5px solid #d0d0d0; border-radius: 12px; padding: 6px; min-width: 200px; z-index: 9999; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
  .dropdown-menu.open { display: block; }
  .dropdown-item { padding: 8px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
  .dropdown-item:hover { background: #f5f5f5; }
  .check { font-size: 12px; }
  .dropdown-divider { height: 1px; background: #eee; margin: 4px 6px; }
  .dropdown-group-label { padding: 6px 12px 2px; font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }

  #stage { flex: 1; overflow: hidden; display: flex; align-items: stretch; position: relative; }
  #vp-outer { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  #vp-track { position: relative; display: flex; align-items: center; height: 100%; }

  .handle { width: 28px; height: 28px; border-radius: 50%; background: #5b5bd6; cursor: ew-resize; flex-shrink: 0; display: flex; align-items: center; justify-content: center; z-index: 50; transition: transform 0.1s; }
  .handle:hover { transform: scale(1.15); }
  .handle svg { pointer-events: none; }
  #handle-left  { margin-right: -14px; }
  #handle-right { margin-left:  -14px; }

  #viewport { position: relative; height: 100%; overflow: hidden; background: #ffffff; display: flex; flex-direction: column; }
  #mobile-nav-bar { width: 100%; flex-shrink: 0; background: #ffffff; display: none; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: #aaa; letter-spacing: 0.5px; border-bottom: 1px solid #eee; }
  #content-area { flex: 1; display: flex; overflow: hidden; position: relative; background: #ffffff; }
  #nav-panel { background: #ffffff; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #aaa; font-weight: 500; letter-spacing: 0.5px; border-right: 1px solid #eee; position: relative; z-index: 2; }
  #nav-panel .nav-label { writing-mode: vertical-rl; transform: rotate(180deg); }

  /* Layout panes — fills remaining space after nav */
  #layout-panes { flex: 1; position: relative; overflow: hidden; z-index: 2; }

  /* The CSS grid container — sits inside layout-panes */
  .grid-stage {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    padding: 60px 0;
    z-index: 2;
  }

  /* The actual CSS grid */
  .ep-grid {
    width: 100%;
    max-width: 1408px;
    margin: 0 auto;
    display: grid;
    gap: 20px;
    height: 100%;
  }

  /* Column overlay — sits behind everything */
  #grid-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
  .col-overlay-inner {
    position: absolute;
    inset: 0;
    max-width: 1408px;
    width: 100%;
    margin: 0 auto;
    display: grid;
    gap: 20px;
  }
  .col-overlay-col { }

  /* Pane boxes */
  .pane-box { background: #fff; border-radius: 6px; position: relative; min-height: 120px; }
  .pane-box.card { height: 200px; }
  .pane-box.full-height { height: 100%; }
  .pane-num { position: absolute; top: 12px; left: 12px; width: 26px; height: 26px; border-radius: 50%; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; }

  #bp-badge { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px; pointer-events: none; z-index: 20; white-space: nowrap; }
  #width-label { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: #fff; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 999px; pointer-events: none; z-index: 100; white-space: nowrap; }
</style>
</head>
<body>

<div id="toolbar">
  <div id="logo">GRIDDLE</div>
  <div class="dropdown-wrap" id="dd-layout">
    <button class="pill-btn" onclick="toggleDD('dd-layout')">
      <span id="layout-label">Full-width</span>
      <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 4l4 4 4-4" stroke="#555" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
    </button>
    <div class="dropdown-menu" id="dd-layout-menu"></div>
  </div>
  <div class="dropdown-wrap" id="dd-vp">
    <button class="pill-btn" onclick="toggleDD('dd-vp')">
      <span id="vp-label">1200</span>
      <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 4l4 4 4-4" stroke="#555" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
    </button>
    <div class="dropdown-menu" id="dd-vp-menu"></div>
  </div>
  <div class="dropdown-wrap" id="dd-cols">
    <button class="pill-btn" onclick="toggleDD('dd-cols')">
      <span id="cols-label">Show columns</span>
      <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 4l4 4 4-4" stroke="#555" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
    </button>
    <div class="dropdown-menu" id="dd-cols-menu">
      <div class="dropdown-item" onclick="setColumns(true)">Show columns <span class="check" id="chk-show">✓</span></div>
      <div class="dropdown-item" onclick="setColumns(false)">Hide columns <span class="check" id="chk-hide" style="display:none">✓</span></div>
    </div>
  </div>
  <div class="dropdown-wrap" id="dd-nav">
    <button class="pill-btn" onclick="toggleDD('dd-nav')">
      <span id="nav-label">Primary nav</span>
      <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 4l4 4 4-4" stroke="#555" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
    </button>
    <div class="dropdown-menu" id="dd-nav-menu">
      <div class="dropdown-group-label">Desktop</div>
      <div class="dropdown-item" onclick="setNav('none')">No nav <span class="check" id="chk-nav-none" style="display:none">✓</span></div>
      <div class="dropdown-item" onclick="setNav('primary')">Primary nav (80px) <span class="check" id="chk-nav-primary">✓</span></div>
      <div class="dropdown-item" onclick="setNav('expanded')">Expanded nav (240px) <span class="check" id="chk-nav-expanded" style="display:none">✓</span></div>
      <div class="dropdown-divider"></div>
      <div class="dropdown-group-label">Mobile</div>
      <div class="dropdown-item" onclick="setNav('mobile-top')">Mobile top bar (64px) <span class="check" id="chk-nav-mobile-top" style="display:none">✓</span></div>
    </div>
  </div>
</div>

<div id="stage">
  <div id="vp-outer">
    <div id="vp-track">
      <div class="handle" id="handle-left">
        <svg width="10" height="12" viewBox="0 0 10 12" fill="none">
          <line x1="2" y1="1" x2="2" y2="11" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="5" y1="1" x2="5" y2="11" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="8" y1="1" x2="8" y2="11" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div id="viewport">
        <div id="mobile-nav-bar">NAV</div>
        <div id="content-area">
          <div id="nav-panel"><span class="nav-label">NAV</span></div>
          <div id="layout-panes">
            <div id="grid-overlay"></div>
            <div id="bp-badge"></div>
          </div>
        </div>
        <div id="width-label"></div>
      </div>
      <div class="handle" id="handle-right">
        <svg width="10" height="12" viewBox="0 0 10 12" fill="none">
          <line x1="2" y1="1" x2="2" y2="11" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="5" y1="1" x2="5" y2="11" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="8" y1="1" x2="8" y2="11" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
  </div>
</div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────
var MAX_WIDTH    = 1408;
var GAP          = 20;
var MOBILE_TOP_H = 64;
var INSET        = 60; // top/bottom padding for grid-stage

var NAV_WIDTHS = { none: 0, primary: 80, expanded: 240, 'mobile-top': 0 };
var NAV_LABELS = { none: 'No nav', primary: 'Primary nav', expanded: 'Expanded nav', 'mobile-top': 'Mobile top bar' };
var NAV_DESKTOP = ['none', 'primary', 'expanded'];
var NAV_MOBILE  = ['mobile-top'];

// Pane colours — fixed per index
var PC = [
  { b: '#5b5bd6', t: '#fff' },
  { b: '#d6395b', t: '#fff' },
  { b: '#d67a1a', t: '#fff' },
  { b: '#1a9e5c', t: '#fff' }
];

// Container query breakpoints (based on panesW — width of layout-panes)
// Default: < 576px  → 4 cols, px 20px
// @xl:     >= 576px → 8 cols, px 20px
// @3xl:    >= 768px → 12 cols, px 40px
// @6xl:    >= 1152px → 12 cols, px 96px
var BPS = [
  { minW: 1152, cols: 12, pad: 96,  colColor: 'rgba(190,240,210,0.65)', badgeBg: '#90d8aa', badgeText: '#0a4a22', label: '@6xl  1152px+' },
  { minW: 768,  cols: 12, pad: 40,  colColor: 'rgba(190,220,255,0.65)', badgeBg: '#90c4f5', badgeText: '#0a3a6a', label: '@3xl  768–1151px' },
  { minW: 576,  cols: 8,  pad: 20,  colColor: 'rgba(220,220,255,0.65)', badgeBg: '#c4c4f5', badgeText: '#2a2a7a', label: '@xl   576–767px' },
  { minW: 0,    cols: 4,  pad: 20,  colColor: 'rgba(252,209,220,0.7)',  badgeBg: '#f9a8c0', badgeText: '#7a1a36', label: 'Default  0–575px' },
];

function getBP(w) {
  for (var i = 0; i < BPS.length; i++) {
    if (w >= BPS[i].minW) return BPS[i];
  }
  return BPS[BPS.length - 1];
}

// Layout definitions
// gridCols: CSS grid-template-columns per bp [default, @xl, @3xl, @6xl]
// paneSpans: column spans per pane per bp
// card: fixed 200px height cards
// narrowOffset: [colStart, colSpan] per bp for Medium/Narrow
var LAYOUTS = [
  {
    id: 'full', label: 'Full-width',
    panes: 1,
    // spans all cols at every bp
    getSpans: function(bp) { return [[1, bp.cols]]; }
  },
  {
    id: 'narrow', label: 'Narrow',
    panes: 1,
    // Default/@xl: full width; @3xl: cols 2–11 (10 of 12); @6xl: cols 3–10 (8 of 12)
    getSpans: function(bp) {
      if (bp.minW >= 1152) return [[3, 8]];   // @6xl: start 3, span 8
      if (bp.minW >= 768)  return [[2, 10]];  // @3xl: start 2, span 10
      return [[1, bp.cols]];                   // default/@xl: full
    }
  },
  {
    id: 'half', label: 'Half / Half',
    panes: 2,
    getSpans: function(bp) {
      if (bp.minW >= 768) return [[1,6],[7,6]]; // @3xl+: 6+6
      return null; // stacked
    }
  },
  {
    id: '1q3q', label: 'One-quarter / Three-quarters',
    panes: 2,
    getSpans: function(bp) {
      if (bp.minW >= 768) return [[1,3],[4,9]]; // @3xl+: 3+9
      return null; // stacked
    }
  },
  {
    id: '3q1q', label: 'Three-quarters / One-quarter',
    panes: 2,
    getSpans: function(bp) {
      if (bp.minW >= 768) return [[1,9],[10,3]]; // @3xl+: 9+3
      return null; // stacked
    }
  },
  {
    id: '1t2t', label: 'One-third / Two-thirds',
    panes: 2,
    getSpans: function(bp) {
      if (bp.minW >= 768) return [[1,4],[5,8]]; // @3xl+: 4+8
      return null;
    }
  },
  {
    id: '2t1t', label: 'Two-thirds / One-third',
    panes: 2,
    getSpans: function(bp) {
      if (bp.minW >= 768) return [[1,8],[9,4]]; // @3xl+: 8+4
      return null;
    }
  },
  {
    id: 'thirds', label: 'One-third / One-third / One-third',
    panes: 3, card: true,
    getSpans: function(bp) {
      if (bp.minW >= 768)  return [[1,4],[5,4],[9,4]];   // @3xl+: 3 cols
      if (bp.minW >= 576)  return [[1,4],[5,4],[1,4]];   // @xl: 2 cols wrap (special)
      return null; // stacked
    }
  },
  {
    id: 'quarters', label: 'Quarters',
    panes: 4, card: true,
    getSpans: function(bp) {
      if (bp.minW >= 1152) return [[1,3],[4,3],[7,3],[10,3]];  // @6xl: 4 cols
      if (bp.minW >= 768)  return [[1,4],[5,4],[9,4],[1,4]];  // @3xl: 3 cols wrap
      if (bp.minW >= 576)  return [[1,4],[5,4],[1,4],[5,4]];  // @xl: 2 cols wrap
      return null; // stacked
    }
  },
];

var VP_PRESETS = [320, 375, 390, 430, 576, 768, 1024, 1152, 1280, 1408, 1536];
var S = { vpWidth: 1200, layoutId: 'full', showCols: true, nav: 'primary' };

var $vp      = document.getElementById('viewport');
var $grid    = document.getElementById('grid-overlay');
var $navP    = document.getElementById('nav-panel');
var $mobileN = document.getElementById('mobile-nav-bar');
var $panes   = document.getElementById('layout-panes');
var $wLabel  = document.getElementById('width-label');
var $badge   = document.getElementById('bp-badge');
var $stage   = document.getElementById('stage');

function render() {
  var navW     = NAV_WIDTHS[S.nav];
  var isMobTop = S.nav === 'mobile-top';
  var vpW      = S.vpWidth;
  var panesW   = Math.max(vpW - navW, 0);
  var bp       = getBP(panesW);

  // Viewport
  $vp.style.width        = vpW + 'px';
  $mobileN.style.display = isMobTop ? 'flex' : 'none';
  $mobileN.style.height  = MOBILE_TOP_H + 'px';
  $navP.style.width      = navW + 'px';
  $navP.style.background = '#ffffff';
  $navP.style.display    = (!isMobTop && navW > 0) ? 'flex' : 'none';
  $wLabel.textContent    = vpW + 'px';
  $badge.textContent     = bp.label;
  $badge.style.background = bp.badgeBg;
  $badge.style.color      = bp.badgeText;

  // ── Column overlay ──────────────────────────────────────────────────────
  $grid.innerHTML = '';
  $grid.style.display = S.showCols ? 'block' : 'none';

  if (S.showCols) {
    var inner = document.createElement('div');
    inner.className = 'col-overlay-inner';
    inner.style.gridTemplateColumns = 'repeat(' + bp.cols + ', 1fr)';
    inner.style.padding = '0 ' + bp.pad + 'px';
    for (var i = 0; i < bp.cols; i++) {
      var col = document.createElement('div');
      col.style.background = bp.colColor;
      inner.appendChild(col);
    }
    $grid.appendChild(inner);
  }

  // ── Layout panes ────────────────────────────────────────────────────────
  // Remove old grid stage
  var old = $panes.querySelector('.grid-stage');
  if (old) old.remove();

  var layout = null;
  for (var i = 0; i < LAYOUTS.length; i++) {
    if (LAYOUTS[i].id === S.layoutId) { layout = LAYOUTS[i]; break; }
  }
  if (!layout) return;

  var spans   = layout.getSpans(bp);
  var isCard  = !!layout.card;
  var n       = layout.panes;
  var stacked = !spans;

  // Build grid stage wrapper
  var stage = document.createElement('div');
  stage.className = 'grid-stage';

  if (stacked) {
    // Stack vertically — one full-width pane per row
    var g = document.createElement('div');
    g.className = 'ep-grid';
    g.style.gridTemplateColumns = '1fr';
    g.style.padding = '0 ' + bp.pad + 'px';
    g.style.height = 'auto';
    g.style.alignContent = 'start';
    g.style.gap = GAP + 'px';
    for (var i = 0; i < n; i++) g.appendChild(makePaneBox(i, isCard, false));
    stage.appendChild(g);

  } else if (S.layoutId === 'thirds' && bp.minW >= 576 && bp.minW < 768) {
    // Thirds @xl: 2+1 wrap
    var g = document.createElement('div');
    g.className = 'ep-grid';
    g.style.gridTemplateColumns = 'repeat(2, 1fr)';
    g.style.padding = '0 ' + bp.pad + 'px';
    g.style.height = 'auto';
    g.style.alignContent = 'start';
    for (var i = 0; i < n; i++) g.appendChild(makePaneBox(i, true, false));
    stage.appendChild(g);

  } else if (S.layoutId === 'quarters' && bp.minW >= 576 && bp.minW < 768) {
    // Quarters @xl: 2-col wrap
    var g = document.createElement('div');
    g.className = 'ep-grid';
    g.style.gridTemplateColumns = 'repeat(2, 1fr)';
    g.style.padding = '0 ' + bp.pad + 'px';
    g.style.height = 'auto';
    g.style.alignContent = 'start';
    for (var i = 0; i < n; i++) g.appendChild(makePaneBox(i, true, false));
    stage.appendChild(g);

  } else if (S.layoutId === 'quarters' && bp.minW >= 768 && bp.minW < 1152) {
    // Quarters @3xl: 3-col wrap
    var g = document.createElement('div');
    g.className = 'ep-grid';
    g.style.gridTemplateColumns = 'repeat(3, 1fr)';
    g.style.padding = '0 ' + bp.pad + 'px';
    g.style.height = 'auto';
    g.style.alignContent = 'start';
    for (var i = 0; i < n; i++) g.appendChild(makePaneBox(i, true, false));
    stage.appendChild(g);

  } else if (S.layoutId === 'narrow') {
    // Narrow: centred single pane using CSS grid placement
    var colSpan = spans[0][1];
    var colStart = spans[0][0];
    var g = document.createElement('div');
    g.className = 'ep-grid';
    g.style.gridTemplateColumns = 'repeat(' + bp.cols + ', 1fr)';
    g.style.padding = '0 ' + bp.pad + 'px';
    var box = makePaneBox(0, false, true);
    box.style.gridColumn = colStart + ' / span ' + colSpan;
    g.appendChild(box);
    stage.appendChild(g);

  } else {
    // Standard side-by-side using explicit col placement
    var g = document.createElement('div');
    g.className = 'ep-grid';
    g.style.gridTemplateColumns = 'repeat(' + bp.cols + ', 1fr)';
    g.style.padding = '0 ' + bp.pad + 'px';
    if (isCard) { g.style.height = 'auto'; g.style.alignContent = 'start'; }

    for (var i = 0; i < spans.length; i++) {
      var box = makePaneBox(i, isCard, !isCard);
      box.style.gridColumn = spans[i][0] + ' / span ' + spans[i][1];
      g.appendChild(box);
    }
    stage.appendChild(g);
  }

  $panes.appendChild(stage);
}

function makePaneBox(idx, isCard, fullHeight) {
  var c   = PC[idx % PC.length];
  var box = document.createElement('div');
  box.className = 'pane-box' + (isCard ? ' card' : '') + (fullHeight ? ' full-height' : '');
  box.style.border = '1.5px solid ' + c.b;
  var num = document.createElement('div');
  num.className = 'pane-num';
  num.textContent = String(idx + 1);
  num.style.background = c.b;
  num.style.color = c.t;
  box.appendChild(num);
  return box;
}

// ── DROPDOWNS ──────────────────────────────────────────────────────────────
function toggleDD(id) {
  var menus = document.querySelectorAll('.dropdown-menu');
  for (var i = 0; i < menus.length; i++) {
    if (menus[i].id !== id + '-menu') menus[i].classList.remove('open');
  }
  document.getElementById(id + '-menu').classList.toggle('open');
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.dropdown-wrap')) {
    var menus = document.querySelectorAll('.dropdown-menu');
    for (var i = 0; i < menus.length; i++) menus[i].classList.remove('open');
  }
});

var $layoutMenu = document.getElementById('dd-layout-menu');
LAYOUTS.forEach(function(l) {
  var item = document.createElement('div');
  item.className = 'dropdown-item';
  item.innerHTML = l.label + ' <span class="check" style="display:' + (l.id === S.layoutId ? 'inline' : 'none') + '">✓</span>';
  item.onclick = function() {
    S.layoutId = l.id;
    document.getElementById('layout-label').textContent = l.label;
    var items = $layoutMenu.querySelectorAll('.dropdown-item');
    for (var i = 0; i < items.length; i++) {
      items[i].querySelector('.check').style.display = LAYOUTS[i].id === l.id ? 'inline' : 'none';
    }
    toggleDD('dd-layout'); render();
  };
  $layoutMenu.appendChild(item);
});

var $vpMenu = document.getElementById('dd-vp-menu');
VP_PRESETS.forEach(function(w) {
  var item = document.createElement('div');
  item.className = 'dropdown-item';
  item.innerHTML = w + 'px <span class="check" style="display:none">✓</span>';
  item.onclick = function() {
    S.vpWidth = w;
    document.getElementById('vp-label').textContent = w;
    var items = $vpMenu.querySelectorAll('.dropdown-item');
    for (var i = 0; i < items.length; i++) {
      items[i].querySelector('.check').style.display = VP_PRESETS[i] === w ? 'inline' : 'none';
    }
    toggleDD('dd-vp'); autoNav(); render();
  };
  $vpMenu.appendChild(item);
});

function setColumns(show) {
  S.showCols = show;
  document.getElementById('cols-label').textContent = show ? 'Show columns' : 'Hide columns';
  document.getElementById('chk-show').style.display = show ? 'inline' : 'none';
  document.getElementById('chk-hide').style.display = show ? 'none' : 'inline';
  toggleDD('dd-cols'); render();
}

function setNav(val) {
  S.nav = val;
  document.getElementById('nav-label').textContent = NAV_LABELS[val];
  ['none','primary','expanded','mobile-top'].forEach(function(k) {
    document.getElementById('chk-nav-' + k).style.display = k === val ? 'inline' : 'none';
  });
  toggleDD('dd-nav'); render();
}

function updateNavUI() {
  document.getElementById('nav-label').textContent = NAV_LABELS[S.nav];
  ['none','primary','expanded','mobile-top'].forEach(function(k) {
    document.getElementById('chk-nav-' + k).style.display = k === S.nav ? 'inline' : 'none';
  });
}

function autoNav() {
  var isSmall = S.vpWidth < 1024;
  if (isSmall && NAV_DESKTOP.indexOf(S.nav) !== -1) { S.nav = 'mobile-top'; updateNavUI(); }
  else if (!isSmall && NAV_MOBILE.indexOf(S.nav) !== -1) { S.nav = 'primary'; updateNavUI(); }
}

// ── DRAG ───────────────────────────────────────────────────────────────────
var dragging = null, dragX0 = 0, dragW0 = 0;
function dragStart(e, side) {
  dragging = side;
  dragX0 = e.clientX !== undefined ? e.clientX : e.touches[0].clientX;
  dragW0 = S.vpWidth;
  e.preventDefault();
}
document.getElementById('handle-left').addEventListener('mousedown',  function(e){ dragStart(e,'left'); });
document.getElementById('handle-right').addEventListener('mousedown', function(e){ dragStart(e,'right'); });
document.getElementById('handle-left').addEventListener('touchstart',  function(e){ dragStart(e,'left'); }, {passive:false});
document.getElementById('handle-right').addEventListener('touchstart', function(e){ dragStart(e,'right'); }, {passive:false});
document.addEventListener('mousemove', function(e) {
  if (!dragging) return;
  var dx = (e.clientX - dragX0) * (dragging === 'left' ? -2 : 2);
  S.vpWidth = Math.round(Math.max(280, Math.min(dragW0 + dx, $stage.offsetWidth - 80)));
  document.getElementById('vp-label').textContent = S.vpWidth;
  autoNav(); render();
});
document.addEventListener('touchmove', function(e) {
  if (!dragging) return;
  var dx = (e.touches[0].clientX - dragX0) * (dragging === 'left' ? -2 : 2);
  S.vpWidth = Math.round(Math.max(280, Math.min(dragW0 + dx, $stage.offsetWidth - 80)));
  document.getElementById('vp-label').textContent = S.vpWidth;
  autoNav(); render();
}, {passive:false});
document.addEventListener('mouseup',  function(){ dragging = null; });
document.addEventListener('touchend', function(){ dragging = null; });

// ── INIT ───────────────────────────────────────────────────────────────────
S.vpWidth = Math.min(1200, $stage.offsetWidth - 80);
render();
window.addEventListener('resize', function() {
  S.vpWidth = Math.min(S.vpWidth, $stage.offsetWidth - 80);
  render();
});
</script>
</body>
